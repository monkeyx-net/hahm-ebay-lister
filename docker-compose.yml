services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    # Let the container reach services running on the host (e.g. an OmniRoute
    # gateway on the host's :20128). Inside the container "localhost" is the
    # container itself, so a host service must be addressed via
    # host.docker.internal — set OMNIROUTE_BASE_URL=http://host.docker.internal:20128/v1
    # in .env.local. On Linux this hostname only resolves with the mapping below.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  # Pin the bridge to a stable interface name so firewalld rules keep matching it.
  # With firewalld active, a container can reach the internet (Docker's own iptables
  # FORWARD/NAT rules) but NOT host services (e.g. an OmniRoute gateway on the host)
  # unless its bridge is in the ACCEPT "docker" firewalld zone. Docker does not
  # reliably add new bridges to that zone here, and a random br-<id> changes every
  # time the network is recreated — so pin the name and add it once, permanently:
  #   sudo firewall-cmd --permanent --zone=docker --change-interface=ebaylister0
  #   sudo firewall-cmd --zone=docker --change-interface=ebaylister0   # apply now
  # See .env.example for the OMNIROUTE_BASE_URL / host.docker.internal note.
  default:
    driver_opts:
      com.docker.network.bridge.name: ebaylister0
